name: Build

on:
  push:
    tags: "v*.*.*"

permissions:
  contents: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25.3
          cache: 'yarn'
          cache-dependency-path: src/frontend/yarn.lock

      - name: Build frontend
        run: |
          yarn --cwd src/frontend install
          yarn --cwd src/frontend build

      - name: Upload artifact ui
        uses: actions/upload-artifact@v4
        with:
          name: artifact_build-frontend
          path: src/frontend/dist/*

  build-backend:
    needs: build-frontend
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        arch: [ arm64, amd64 ]
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact ui
        uses: actions/download-artifact@v4
        with:
          name: artifact_build-frontend
          path: src/frontend/dist

      - name: Move artifact ui to backend
        run: mv src/frontend/dist src/backend/ui

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache-dependency-path: src/backend/go.sum

      - name: Build backend
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest) export GOOS=linux ;;
            windows-latest) export GOOS=windows ;;
            macos-latest) export GOOS=darwin ;;
          esac

          case "${{ matrix.arch }}" in
            arm64) export GOARCH=arm64 ;;
            amd64) export GOARCH=amd64 ;;
          esac

          case "${{ matrix.os }}" in
            ubuntu-latest) export GOOUT=dlp-ui_${GOOS}_${GOARCH} ;;
            windows-latest) export GOOUT=dlp-ui_${GOOS}_${GOARCH}.exe ;;
            macos-latest) export GOOUT=dlp-ui_${GOOS}_${GOARCH} ;;
          esac

          mkdir -p dist

          cd src/backend
          go build -ldflags "-X main.tag=${GITHUB_REF_NAME} -X main.commit=${GITHUB_SHA}" -o "../../dist/${GOOUT}" .

      - name: Upload artifact dist
        uses: actions/upload-artifact@v4
        with:
          name: artifact_backend-build_${{ matrix.os }}_${{ matrix.arch }}
          path: dist/*

  release:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact dist
        uses: actions/download-artifact@v4
        with:
          pattern: artifact_backend-build_*_*
          merge-multiple: true
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: DLP UI ${{ github.ref_name }}
          draft: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}