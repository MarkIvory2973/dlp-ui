name: Build

on:
  push:
    tags: v*.*.*

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install
        run: |
          cd src/frontend
          npm install

      - name: Build
        run: |
          cd src/frontend
          npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: frontend
          path: src/frontend/dist

  backend:
    needs: frontend
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        arch: [ arm64, amd64 ]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: frontend
          path: src/frontend/dist

      - run: mv src/frontend/dist src/backend/embed/webui

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26
          cache-dependency-path: src/backend/go.sum

      - name: Install
        run: |
          cd src/backend
          go mod tidy

      - name: Build
        shell: bash
        run: |
          case "${GOOS}" in
            linux) export GOOUT=dlp-ui_linux_${GOARCH} ;;
            windows) export GOOUT=dlp-ui_windows_${GOARCH}.exe ;;
            darwin) export GOOUT=dlp-ui_macos_${GOARCH} ;;
          esac

          cd src/backend
          mkdir dist
          go build -ldflags "-X cmd.cli.tag=${GITHUB_REF_NAME} -X cmd.cli.commit=${GITHUB_SHA}" -o "dist/${GOOUT}"

      - uses: actions/upload-artifact@v7
        with:
          name: backend_${{ matrix.os }}_${{ matrix.arch }}
          path: src/backend/dist

  release:
    needs: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: backend_*_*
          merge-multiple: true
          path: dist

      - run: ls

      - run: ls dist

      - run: ls -R dist

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          name: DLP UI ${{ github.ref_name }}
          draft: true
          files: dist